services:
  caddy:
    image: caddy:latest
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - SUBDOMAIN=${SUBDOMAIN}
      - DOMAIN=${DOMAIN}
      - CLOUDFLARE_API_TOKEN=${CLOUDFLARE_API_TOKEN}

  # Playwright browser automation service
  playwright:
    image: mcr.microsoft.com/playwright:v1.50.1-noble
    restart: unless-stopped
    environment:
      - DISPLAY=:99
    ports:
      - "9222:9222"  # Chrome DevTools Protocol
    command: ["/bin/bash", "-c", "Xvfb :99 -screen 0 1920x1080x24 && chromium --remote-debugging-port=9222 --remote-debugging-address=0.0.0.0 --no-sandbox --disable-gpu --disable-dev-shm-usage"]
    volumes:
      - playwright_data:/home/pwuser

  n8n:
    image: n8nio/n8n:latest
    restart: always
    environment:
      - N8N_HOST=${SUBDOMAIN}.${DOMAIN}
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - NODE_ENV=production
      - WEBHOOK_URL=https://${SUBDOMAIN}.${DOMAIN}/
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - N8N_API_KEY=${N8N_API_KEY}
      - N8N_SECURE_COOKIE=true
    volumes:
      - n8n_data:/home/node/.n8n
      - ./imports:/tmp/n8n_import:ro
      - ./workflows:/home/node/export_dir
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  n8n_data:
  caddy_data:
  caddy_config:
  playwright_data:
